name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_performance:
        description: "运行完整性能门禁"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Static checks
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          base="${PR_BASE_SHA:-$PUSH_BEFORE_SHA}"
          if [ -n "$base" ] && [ "$base" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$base^{commit}" 2>/dev/null; then
            git diff --check "$base...HEAD"
          else
            git diff --check
          fi
          python -m py_compile $(git ls-files '*.py')

      - name: CLI smoke
        run: |
          cipher2 --version
          PYTHONPATH=src python -m cipher2 --help

      - name: Unit tests
        env:
          CIPHER2_REQUIRE_LIVE_LIBCLANG: "1"
        run: PYTHONPATH=src python -m unittest discover -s tests

  performance:
    name: Performance gates
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' && inputs.run_performance == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run performance gates
        env:
          PYTHONPATH: src
        run: |
          python scripts/cli_performance_gate.py
          python scripts/config_performance_gate.py
          python scripts/initializer_performance_gate.py
          python scripts/clang_extractor_performance_gate.py
          python scripts/storage_performance_gate.py
          python scripts/storage_relative_performance_gate.py
          python scripts/mcp_performance_gate.py
          python scripts/mcp_relative_performance_gate.py
          python scripts/incremental_performance_gate.py
          python scripts/views_performance_gate.py
          python scripts/log_performance_gate.py
